<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kabir's Eleven</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="tricolor-banner" aria-hidden="true"></header>
    <main class="container">
      <h1>Kabir's Eleven</h1>
      <p class="subtitle">Step 3: Manage cricket players, teams, and matches</p>

      <div class="content-grid">
        <section class="card">
          <h2>Add Player</h2>
          <form id="player-form" novalidate>
            <label for="number">Player Number</label>
            <input id="number" name="number" type="text" required />

            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" required />

            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" required />

            <label for="teamAffiliation">Team Affiliation</label>
            <input
              id="teamAffiliation"
              name="teamAffiliation"
              type="text"
              required
            />

            <label for="specialization">Specialization</label>
            <input
              id="specialization"
              name="specialization"
              type="text"
              required
            />

            <div class="form-actions">
              <button id="submit-player-button" type="submit">
                Create Player
              </button>
              <button id="cancel-edit-button" type="button" class="secondary">
                Cancel Edit
              </button>
            </div>
            <p
              id="form-message"
              class="message"
              role="status"
              aria-live="polite"
            ></p>
          </form>
        </section>

        <section class="card">
          <h2>Players</h2>
          <ul id="player-list"></ul>
        </section>

        <section class="card">
          <h2>Create Team</h2>
          <form id="team-form" novalidate>
            <label for="teamName">Team Name</label>
            <input id="teamName" name="teamName" type="text" required />

            <label for="teamLogo">Team Logo</label>
            <div id="team-logo-options" class="logo-options" role="group"></div>
            <input id="teamLogo" name="teamLogo" type="hidden" required />

            <label for="teamPlayerNumbers">
              Player Numbers (comma-separated, up to 11)
            </label>
            <textarea
              id="teamPlayerNumbers"
              name="teamPlayerNumbers"
              rows="4"
              placeholder="18, 45, 1"
              required
            ></textarea>

            <div class="form-actions">
              <button id="submit-team-button" type="submit">Create Team</button>
              <button
                id="cancel-team-edit-button"
                type="button"
                class="secondary"
              >
                Cancel Edit
              </button>
            </div>
            <p
              id="team-form-message"
              class="message"
              role="status"
              aria-live="polite"
            ></p>
          </form>
        </section>

        <section class="card">
          <h2>Teams</h2>
          <ul id="team-list"></ul>
        </section>
      </div>

      <div class="matches-grid">
        <section class="card">
          <h2>Create Match</h2>
          <form id="match-form" novalidate>
            <label for="matchTeamA">Team A</label>
            <select id="matchTeamA" name="matchTeamA" required></select>

            <label for="matchTeamB">Team B</label>
            <select id="matchTeamB" name="matchTeamB" required></select>

            <label for="teamABatterRuns">
              Team A Batter Runs (playerNumber:runs)
            </label>
            <input
              id="teamABatterRuns"
              name="teamABatterRuns"
              type="text"
              placeholder="18:42, 45:31"
              required
            />

            <label for="teamBBatterRuns">
              Team B Batter Runs (playerNumber:runs)
            </label>
            <input
              id="teamBBatterRuns"
              name="teamBBatterRuns"
              type="text"
              placeholder="7:50, 8:20"
              required
            />

            <label for="teamABowlerWickets">
              Team A Bowler Wickets (playerNumber:wickets)
            </label>
            <input
              id="teamABowlerWickets"
              name="teamABowlerWickets"
              type="text"
              placeholder="19:2, 33:1"
              required
            />

            <label for="teamBBowlerWickets">
              Team B Bowler Wickets (playerNumber:wickets)
            </label>
            <input
              id="teamBBowlerWickets"
              name="teamBBowlerWickets"
              type="text"
              placeholder="11:3, 99:2"
              required
            />

            <button id="submit-match-button" type="submit">Create Match</button>
            <p
              id="match-form-message"
              class="message"
              role="status"
              aria-live="polite"
            ></p>
          </form>
        </section>

        <section class="card">
          <h2>Matches</h2>
          <ul id="match-list"></ul>
        </section>
      </div>
    </main>

    <script src="./player-validation.js"></script>
    <script src="./team-validation.js"></script>
    <script src="./match-validation.js"></script>
    <script src="./app.js"></script>
  </body>
  </html>
